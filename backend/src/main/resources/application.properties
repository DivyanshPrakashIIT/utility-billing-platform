spring.application.name=platform

spring.datasource.url=jdbc:postgresql://localhost:5432/billing?options=-c%20TimeZone=Asia/Kolkata
spring.datasource.username=billing
spring.datasource.password=billing
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=utility-billing-platform-super-secret-key-minimum-256-bits-long
jwt.expiration-ms=86400000